<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Dog Show</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
        <h1>The Dog Show</h1>

        <h2>Welcome to the Dog Show!</h2>

        <div id="zoo-exhibit">
            <h3 id="animal-name">Mystery Dog</h3>

            <div id="animal-picture-box">
                Dog pic here.
            </div>

            <p id="animal-fact">
            </p>

            <div id="zoo-message">
                The puppies are ready to meet you!

            </div>
        </div>

        <h2>Show Options</h2>

        <button id="animal-button" class="btn btn-primary">Get Random Dog</button>
        <button id="color-button" class="btn btn-success">change up the color</button>
        <button id="feed-button" class="btn btn-warning">Give the dog a treat</button>
        <button id="reset-button" class="btn btn-danger">Reset Dog show</button>

        <h2>API stuff</h2>

        <p>
        Dogs: Based on the Stanford Dogs Dataset.
        </p>
        xColors: Generate &amp; convert colors.
        <p>
        
        </div>
        
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
