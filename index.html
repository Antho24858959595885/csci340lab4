<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Wack Zoo</title>
    </head>

    <body>
        <h1>The Wack Zoo</h1>

        <h2>Intro</h2>

        <p>
            welcome to the zoo.
        </p>

        <h2>Zoo Exhibit</h2>

        <div id="zoo-exhibit">
            <h3 id="animal-name">Mystery Animal</h3>

            <div id="animal-picture-box">
                Animal pic here.
            </div>

            <p id="animal-fact">
                animal fact here
            </p>
        </div>

        <h2>Zoo Controls</h2>

        <button id="animal-button">Get Random Animal</button>
        <button id="color-button">Change Exhibit Color</button>
        <button id="feed-button">Feed Animal</button>
        <button id="reset-button">Reset Zoo</button>

        <h2>API stuff</h2>

        <p>
            API info goes here.
        </p>

    </body>
</html>
