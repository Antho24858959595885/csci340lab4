<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Dog Show</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1>The Dog Show</h1>

        <h2>Intro</h2>

        <p>
            Welcome to the Dog Show! 
        </p>

        <h2>Zoo Exhibit</h2>

        <div id="zoo-exhibit">
            <h3 id="animal-name">Mystery Dog</h3>

            <div id="animal-picture-box">
                Dog pic here.
            </div>

            <p id="animal-fact">
                Dog fact here
            </p>

            <div id="zoo-message">
                The puppies are ready to meet you!

            </div>
        </div>

        <h2>Show Options</h2>

        <button id="animal-button">Get Random Dog</button>
        <button id="color-button">change up the color</button>
        <button id="feed-button">Give the dog a treat</button>
        <button id="reset-button">Reset Dog show</button>

        <h2>API stuff</h2>

        <p>
            API info goes here.
        </p>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
